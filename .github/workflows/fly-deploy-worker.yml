name: Deploy worker to Fly.io

# Deploys worker/ to Fly on push to main or the foundation branch when
# worker files change. Can also be triggered manually from the Actions tab.

on:
  push:
    branches:
      - main
      - feature/foundation-rebuild
    paths:
      - 'worker/**'
      - '.github/workflows/fly-deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy worker
    runs-on: ubuntu-latest
    concurrency: deploy-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: worker
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
